<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora de Fandubs - Voces Moduladas</title>
    <link rel="icon" href="Assets/2011x.ico" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'DeboouriaFont';
            src: local('Arial'); 
        }
        body {
            background-color: #2b0000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #panel_top {
            background-color: black;
            border: 2px solid #555;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .vol-indicator {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background-color: gray;
            border: 2px solid white;
            margin: 0 auto 10px auto;
            transition: background-color 0.1s;
        }
        select, input[type="range"], button {
            width: 100%;
            margin-top: 5px;
            margin-bottom: 15px;
            padding: 8px;
            box-sizing: border-box;
            background-color: #222;
            color: white;
            border: 1px solid #444;
        }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; }
        #btn_permisos { background-color: #1a3a5f; padding: 12px; }
        #btn_permisos:hover { background-color: #245285; }
        #btn_record {
            background-color: #880000;
            font-size: 18px;
            padding: 15px;
            border: 3px solid #ff5555;
            border-radius: 5px;
            width: 100%;
            max-width: 400px;
        }
        #btn_record.recording {
            background-color: red;
            border-color: white;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        #btn_download_wav { background-color: #1e4d2b; padding: 12px; margin-top: 10px; }
        #btn_download_wav:hover { background-color: #2b703e; }
        #gif_container img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
            background-color: #111;
        }
        .hidden { display: none !important; }
        .label-green { color: #00FF00; font-weight: bold; font-size: 12px;}
        audio { width: 100%; max-width: 400px; margin-top: 15px; outline: none; }
        #mascota {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background-color: transparent;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }
        #mascota img { width: 150px; height: 150px; }
        #caja_texto { background-color: white; padding: 3px; width: 100%; margin-top: 10px; }
        #caja_interna { background-color: black; padding: 10px; font-family: 'DeboouriaFont', sans-serif; font-size: 14px; min-height: 80px; position: relative; }
        .botones-mascota { margin-top: 10px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .botones-mascota button { width: auto; padding: 5px 15px; margin: 0; }
    </style>
</head>
<body>

    <div id="panel_top">
        <button id="btn_permisos" onclick="solicitarPermisos()">🎙️ ACTIVAR MICRÓFONOS</button>
        <div id="vol_indicator" class="vol-indicator"></div>

        <label style="font-size: 12px; font-weight: bold;">SELECCIONAR VOZ:</label>
        <select id="combo_voz">
            <option value="2011x">2011x</option>
            <option value="fleetway">Fleetway</option>
            <option value="furnace">Furnace</option>
            <option value="bitcrusher">Bitcrusher</option>
        </select>

        <label class="label-green">VOLUMEN DE VOZ:</label>
        <input type="range" id="slider_volumen" min="0.5" max="4.0" step="0.1" value="1.5">

        <div id="frame_bitcrusher" class="hidden" style="border: 1px solid #444; padding: 10px; margin-bottom: 10px;">
            <label class="label-green" style="display:block; margin-bottom:10px;">INTENSIDAD DE BITCRUSHER</label>
            <label style="font-size: 12px;">Bit Depth (%)</label>
            <input type="range" id="slider_bit_depth" min="1" max="100" value="50">
            <label style="font-size: 12px;">Sample Reduction (%)</label>
            <input type="range" id="slider_sample_reduction" min="1" max="100" value="50">
        </div>

        <label style="font-size: 12px;">ENTRADA (Tu Mic):</label>
        <select id="combo_in">
            <option value="default">Micrófono por defecto</option>
        </select>
    </div>

    <div id="gif_container">
        <img id="lbl_gif" src="Assets/fondo2011x.gif" alt="GIF de fondo" onerror="this.src='Assets/fondo.gif'">
    </div>

    <button id="btn_record" onclick="toggleRecording()" style="margin-top: 20px;">🔴 INICIAR GRABACIÓN</button>
    <audio id="audio_preview" controls class="hidden"></audio>
    <button id="btn_download_wav" class="hidden" onclick="descargarWAV()">💾 GUARDAR COMO WAV</button>

    <div id="mascota">
        <img id="img_cy" src="Assets/Cy1.png" alt="Cyprinathos" onerror="this.style.display='none'">
        <div id="caja_texto">
            <div id="caja_interna">
                <span id="txt_dialogo"></span>
                <div id="frame_botones" class="botones-mascota hidden">
                    <button onclick="opcionSi()">Sí</button>
                    <button onclick="cerrarMascota()">No</button>
                    <button onclick="opcionNunca()" style="color: gray; background: none; border: none; font-size: 11px;">No, y no volver a preguntar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioContext;
        let mediaStreamSource;
        let processor;
        let isRecording = false;
        let recordedBuffers = [];
        let recordedSampleRate = 44100;
        let lastWavBlob = null;

        let currentVoice = "2011x";
        let bitDepthVal = 50;
        let sampleReductionVal = 50;
        let volumenGlobal = 1.5;

        // Historiales para los efectos de delay/eco/reverb (simulación np.zeros_like)
        let delayBufferFleetway = [];
        let delayBufferFurnace = [];
        
        const btnPermisos = document.getElementById('btn_permisos');
        const btnRecord = document.getElementById('btn_record');
        const comboVoz = document.getElementById('combo_voz');
        const comboIn = document.getElementById('combo_in');
        const sliderVol = document.getElementById('slider_volumen');
        const frameBitcrusher = document.getElementById('frame_bitcrusher');
        const lblGif = document.getElementById('lbl_gif');
        const volIndicator = document.getElementById('vol_indicator');
        const audioPreview = document.getElementById('audio_preview');
        const btnDownloadWav = document.getElementById('btn_download_wav');

        const gifs = {
            "2011x": "Assets/fondo2011x.gif",
            "fleetway": "Assets/fondofleetway.gif",
            "furnace": "Assets/fondofurnace.gif",
            "bitcrusher": "Assets/Glitch.gif"
        };

        // Función matemática para cambiar el Pitch en JavaScript (Simula librosa.effects.pitch_shift)
        function shiftPitch(inputData, stepShift) {
            if (stepShift === 0) return inputData;
            // Factor de velocidad basado en los n_steps
            let factor = Math.pow(2, stepShift / 12); 
            let len = inputData.length;
            let output = new Float32Array(len);
            for (let i = 0; i < len; i++) {
                let targetPos = i * factor;
                let base = Math.floor(targetPos);
                let alpha = targetPos - base;
                if (base + 1 < len) {
                    output[i] = (1 - alpha) * inputData[base] + alpha * inputData[base + 1];
                } else if (base < len) {
                    output[i] = inputData[base];
                } else {
                    output[i] = 0;
                }
            }
            return output;
        }

        async function solicitarPermisos() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                btnPermisos.style.display = "none";
                stream.getTracks().forEach(track => track.stop());
                const devices = await navigator.mediaDevices.enumerateDevices();
                let mikes = devices.filter(d => d.kind === 'audioinput');
                if (mikes.length > 0) {
                    comboIn.innerHTML = '';
                    mikes.forEach(device => {
                        const option = document.createElement('option');
                        option.value = device.deviceId;
                        option.text = device.label || `Micrófono (${device.deviceId.substring(0,5)}...)`;
                        comboIn.appendChild(option);
                    });
                }
            } catch (err) {
                console.error(err);
                alert("Para grabar necesitas dar acceso al micrófono.");
            }
        }

        async function toggleRecording() {
            if (!isRecording) iniciarGrabacion();
            else detenerGrabacion();
        }

        async function iniciarGrabacion() {
            try {
                if (audioContext) audioContext.close();
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                recordedSampleRate = audioContext.sampleRate;
                
                // Calcular tamaño de buffers de retraso según los samples de tu código Python
                let samplesDelayFleetway = Math.floor(recordedSampleRate * 0.08); // delay_reverb
                let samplesDelayFurnace = Math.floor(recordedSampleRate * 0.05);  // delay_eco
                
                delayBufferFleetway = new Float32Array(samplesDelayFleetway).fill(0);
                delayBufferFurnace = new Float32Array(samplesDelayFurnace).fill(0);

                const inputId = comboIn.value;
                const constraints = { audio: { echoCancellation: false, noiseSuppression: false } };
                if (inputId && inputId !== "default") constraints.audio.deviceId = { exact: inputId };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                btnPermisos.style.display = "none"; 

                mediaStreamSource = audioContext.createMediaStreamSource(stream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                recordedBuffers = []; 
                
                processor.onaudioprocess = function(e) {
                    const inputData = e.inputBuffer.getChannelData(0);
                    let outputData = new Float32Array(inputData.length);
                    
                    let sum = 0;
                    for (let i = 0; i < inputData.length; i++) sum += inputData[i] * inputData[i];
                    let rms = Math.sqrt(sum / inputData.length);
                    volIndicator.style.backgroundColor = (rms > 0.005) ? "#00FF00" : "gray";

                    // --- TRADUCCIÓN DE TU LÓGICA DE PYTHON ---
                    
                    if (currentVoice === "2011x") {
                        // Capa 1 (-2), Capa 2 (-4), Capa 3 (-6) -> Promediadas / 3.0
                        let capa1 = shiftPitch(inputData, -2);
                        let capa2 = shiftPitch(inputData, -4);
                        let capa3 = shiftPitch(inputData, -6);
                        for (let i = 0; i < inputData.length; i++) {
                            outputData[i] = ((capa1[i] + capa2[i] + capa3[i]) / 3.0) * volumenGlobal;
                        }
                    } 
                    else if (currentVoice === "fleetway") {
                        // capa_pitch = -6 steps. audio_pitch = 50% mono + 50% pitch
                        let capaPitch = shiftPitch(inputData, -6);
                        let audioPitch = new Float32Array(inputData.length);
                        for(let i=0; i<inputData.length; i++) {
                            audioPitch[i] = (inputData[i] * 0.5) + (capaPitch[i] * 0.5);
                        }
                        // Reverb delay histórico (0.08s) -> mezcla (80% pitch + 20% reverb)
                        for(let i=0; i<inputData.length; i++) {
                            let reverbVal = delayBufferFleetway[0];
                            // Desplazar el buffer histórico simulando np.zeros_like continuado
                            delayBufferFleetway = shiftArrayLeft(delayBufferFleetway, audioPitch[i]);
                            
                            let mezcla = (audioPitch[i] * 0.80) + (reverbVal * 0.20);
                            outputData[i] = Math.max(-1.0, Math.min(1.0, mezcla)) * volumenGlobal;
                        }
                    } 
                    else if (currentVoice === "furnace") {
                        // audio_grave = -3 steps
                        let audioGrave = shiftPitch(inputData, -3);
                        let audioCrushed = new Float32Array(inputData.length);
                        
                        // salto = 7 downsampled y un escalonado de 128.0 bits
                        let salto = 7;
                        let escalones = 128.0;
                        let lastVal = 0;
                        for (let i = 0; i < audioGrave.length; i++) {
                            if (i % salto === 0) {
                                lastVal = Math.round(audioGrave[i] * escalones) / escalones;
                            }
                            audioCrushed[i] = lastVal;
                        }
                        // Eco delay histórico (0.05s) -> mezcla (70% crushed + 45% eco)
                        for(let i=0; i<inputData.length; i++) {
                            let ecoVal = delayBufferFurnace[0];
                            delayBufferFurnace = shiftArrayLeft(delayBufferFurnace, audioCrushed[i]);
                            
                            let mezcla = (audioCrushed[i] * 0.70) + (ecoVal * 0.45);
                            outputData[i] = Math.max(-1.0, Math.min(1.0, mezcla)) * volumenGlobal;
                        }
                    } 
                    else if (currentVoice === "bitcrusher") {
                        // Salto dinámico y bits dinámicos sacados de tus sliders web
                        let salto = Math.floor(1 + (sampleReductionVal / 100.0) * 39);
                        let bits = Math.max(2.0, 16.0 - (bitDepthVal / 100.0) * 14.0);
                        let escalones = Math.pow(2, bits);
                        let lastVal = 0;
                        
                        for (let i = 0; i < inputData.length; i++) {
                            if (salto > 1) {
                                if (i % salto === 0) lastVal = Math.round(inputData[i] * escalones) / escalones;
                                outputData[i] = lastVal * volumenGlobal;
                            } else {
                                outputData[i] = (Math.round(inputData[i] * escalones) / escalones) * volumenGlobal;
                            }
                            outputData[i] = Math.max(-1.0, Math.min(1.0, outputData[i]));
                        }
                    }

                    if (isRecording) {
                        recordedBuffers.push(new Float32Array(outputData));
                    }
                };

                mediaStreamSource.connect(processor);
                processor.connect(audioContext.destination);

                isRecording = true;
                btnRecord.className = "recording";
                btnRecord.innerHTML = "⏹️ DETENER GRABACIÓN";
                audioPreview.classList.add('hidden');
                btnDownloadWav.classList.add('hidden');

            } catch (err) {
                console.error(err);
                alert("Error al inicializar los efectos.");
            }
        }

        // Utilidad para simular el delay continuo entre bloques de audio
        function shiftArrayLeft(array, newValue) {
            let nextArray = new Float32Array(array.length);
            nextArray.set(array.subarray(1));
            nextArray[array.length - 1] = newValue;
            return nextArray;
        }

        function detenerGrabacion() {
            isRecording = false;
            btnRecord.className = "";
            btnRecord.innerHTML = "🔴 INICIAR NUEVA GRABACIÓN";
            volIndicator.style.backgroundColor = "gray";

            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }

            if (recordedBuffers.length > 0) {
                lastWavBlob = crearArchivoWAV(recordedBuffers, recordedSampleRate);
                const audioUrl = URL.createObjectURL(lastWavBlob);
                audioPreview.src = audioUrl;
                audioPreview.classList.remove('hidden');
                btnDownloadWav.classList.remove('hidden');
            }
        }

        function crearArchivoWAV(buffers, sampleRate) {
            let length = 0;
            for (let b of buffers) length += b.length;
            let interleaved = new Float32Array(length);
            let offset = 0;
            for (let b of buffers) {
                interleaved.set(b, offset);
                offset += b.length;
            }
            let buffer = new ArrayBuffer(44 + interleaved.length * 2);
            let view = new DataView(buffer);
            function writeString(view, offset, string) {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            }
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + interleaved.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); 
            view.setUint16(32, 2, true); 
            view.setUint16(34, 16, true); 
            writeString(view, 36, 'data');
            view.setUint32(40, interleaved.length * 2, true);
            let p = 44;
            for (let i = 0; i < interleaved.length; i++) {
                let sample = Math.max(-1, Math.min(1, interleaved[i]));
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(p, sample, true);
                p += 2;
            }
            return new Blob([view], { type: 'audio/wav' });
        }

        function descargarWAV() {
            if (!lastWavBlob) return;
            const url = URL.createObjectURL(lastWavBlob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `Fandub_${currentVoice}_${new Date().getTime()}.wav`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        }

        comboVoz.addEventListener('change', (e) => {
            currentVoice = e.target.value;
            lblGif.src = gifs[currentVoice] || "Assets/fondo.gif";
            if (currentVoice === "bitcrusher") frameBitcrusher.classList.remove('hidden');
            else frameBitcrusher.classList.add('hidden');
        });

        sliderVol.addEventListener('input', (e) => volumenGlobal = parseFloat(e.target.value));
        sliderBitDepth.addEventListener('input', (e) => bitDepthVal = e.target.value);
        sliderSampleReduction.addEventListener('input', (e) => sampleReductionVal = e.target.value);

        // --- MASCOTA ---
        const mascotaDiv = document.getElementById('mascota');
        const btnMascota = document.getElementById('frame_botones');
        const imgCy = document.getElementById('img_cy');
        let typeInterval;

        function typeText(text, callback) {
            document.getElementById('txt_dialogo').innerHTML = "";
            let i = 0;
            clearInterval(typeInterval);
            typeInterval = setInterval(() => {
                if (i < text.length) {
                    let char = text.charAt(i);
                    if(char === '\n') document.getElementById('txt_dialogo').innerHTML += "<br>";
                    else document.getElementById('txt_dialogo').innerHTML += char;
                    i++;
                } else {
                    clearInterval(typeInterval);
                    if (callback) callback();
                }
            }, 30);
        }

        function initMascota() {
            if (localStorage.getItem("cyprinathos_never_show") === "true") return;
            mascotaDiv.style.display = "flex";
            typeText("¿Listo para probar los nuevos efectos?", () => {
                btnMascota.classList.remove('hidden');
            });
        }

        function opcionSi() {
            btnMascota.classList.add('hidden');
            imgCy.src = "Assets/Cy2.png";
            typeText("¡Cambiados los algoritmos de Pitch y Reverb!\nPresiona Activar Micrófonos y haz tu prueba.", () => {
                document.getElementById('caja_texto').onclick = cerrarMascota;
            });
        }
        function cerrarMascota() { mascotaDiv.style.display = "none"; }
        function opcionNunca() { localStorage.setItem("cyprinathos_never_show", "true"); cerrarMascota(); }
        window.onload = () => { setTimeout(initMascota, 2000); };
	//al que sea que lea esto, quiero que sepan que los creditos de esto van 100% de parte de gemini xdxd
    </script>
</body>
</html>
